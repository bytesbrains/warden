# Per-node Warden federation member (testnet). One fly app per node; the deploy script
# (deploy/fly/deploy.sh) overrides the app name with -a maktub-warden-node-<i>.
#
# TESTNET ONLY: an all-ours federation has ZERO timing-security — real security
# requires these nodes to run on independent institutions' own infra. This config is the
# faithful topology + a clean hand-off (a real operator runs the same image on their fly/VM).
app = "maktub-warden-node"
primary_region = "iad"

[build]
  # Path is resolved relative to THIS config file's directory (deploy/fly/), so just the
  # filename. The build context is the cwd `fly deploy` runs from — deploy.sh cd's to warden/
  # so the Dockerfile's `COPY core/ …` (workspace members) resolve.
  dockerfile = "Dockerfile"

# Non-secret config. Secrets (WARDEN_SHARE_B64, WARDEN_RPC_URL) are set via `fly secrets set`
# by deploy.sh — never put them here.
[env]
  WARDEN_CHAIN_ID = "84532"          # Base Sepolia
  WARDEN_FINALITY_TAG = "finalized"  # reorg-safe read tag (reorg-after-release is a leak)
  WARDEN_LISTEN = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  # The node holds a chain-watcher and must answer /partial reliably — keep it always-on,
  # never scale to zero.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Coarse edge throttle (complements the node's per-IP rate limit + fly's edge DDoS): queue
  # above soft_limit, shed above hard_limit, so a flood can't pile unbounded work on one machine.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
